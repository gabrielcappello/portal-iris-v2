name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # Portão real: next build type-checka o projeto inteiro e falha em erro de tipo.
      - name: Build (type-check + build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # Informativo: dívida de lint pré-existente não bloqueia (ver AGENTS.md).
      - name: Lint (report)
        run: npx eslint . || true
